name: Deploy to Kubernetes

on:
  push:
    branches:
      - main

jobs:

  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout source code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build backend image
      run: |
        docker build -t fashion-backend:latest ./api

    - name: Build frontend image
      run: |
        docker build -t fashion-frontend:latest ./client

    - name: Setup kubectl
      uses: azure/setup-kubectl@v3

    - name: Update Kubernetes backend deployment
      run: |
        kubectl set image deployment/fashion-backend \
        fashion-backend=fashion-backend:latest \
        -n fashion-platform

    - name: Update Kubernetes frontend deployment
      run: |
        kubectl set image deployment/fashion-frontend \
        fashion-frontend=fashion-frontend:latest \
        -n fashion-platform