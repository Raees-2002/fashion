name: build-and-deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: checkout code
      uses: actions/checkout@v3

    - name: configure aws credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: login to ecr
      run: |
        aws ecr get-login-password --region $AWS_REGION | \
        docker login --username AWS --password-stdin \
        ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

    - name: build backend image
      run: |
        docker build -t fashion-backend ./api
        docker tag fashion-backend:latest \
        ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/fashion-backend:${{ github.sha }}
        docker push \
        ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/fashion-backend:${{ github.sha }}

    - name: update k8s image tag
      run: |
        sed -i "s|fashion-backend:.*|fashion-backend:${{ github.sha }}|g" k8s/backend-deployment.yaml

    - name: commit updated manifest
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add k8s/backend-deployment.yaml
        git commit -m "update backend image tag"
        git push
